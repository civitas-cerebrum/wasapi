services:
  backend:
    image: umutayb/book-hive-backend:latest
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://mongodb:27017/bookhive
      JWT_SECRET: test-secret-key-for-development-only

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
